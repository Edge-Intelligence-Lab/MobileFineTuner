name: operator-ci

on:
  push:
    paths:
      - ".github/workflows/operator-ci.yml"
      - "operator/**"
      - "gpt2_small_lora_finetune/**"
      - "gpt2_medium_lora_finetune/**"
      - "gemma_3_270m_lora_finetune/**"
      - "gemma_3_1b_pt_lora_finetune/**"
      - "qwen_lora_finetune/**"
      - "scripts/run_training_smoke.sh"
      - "scripts/check_release_tree.sh"
      - "scripts/check_local_assets.sh"
      - "scripts/asset_paths.py"
      - "scripts/lib/**"
      - "scripts/android/**"
      - "android-visualizer/**"
      - "docs/**"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/operator-ci.yml"
      - "operator/**"
      - "gpt2_small_lora_finetune/**"
      - "gpt2_medium_lora_finetune/**"
      - "gemma_3_270m_lora_finetune/**"
      - "gemma_3_1b_pt_lora_finetune/**"
      - "qwen_lora_finetune/**"
      - "scripts/run_training_smoke.sh"
      - "scripts/check_release_tree.sh"
      - "scripts/check_local_assets.sh"
      - "scripts/asset_paths.py"
      - "scripts/lib/**"
      - "scripts/android/**"
      - "android-visualizer/**"
      - "docs/**"
      - "README.md"

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Release tree audit
        run: bash scripts/check_release_tree.sh

      - name: Configure
        run: >
          cmake -S operator -B operator/build
          -DCMAKE_BUILD_TYPE=Release
          -DOPERATORS_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build operator/build -j4

      - name: Test
        run: ctest --test-dir operator/build --output-on-failure

      - name: Install package
        run: cmake --install operator/build --prefix operator/install

      - name: Consumer package smoke
        run: |
          mkdir -p /tmp/operators-consumer
          cat > /tmp/operators-consumer/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(operators_consumer LANGUAGES CXX)
          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          find_package(Operators REQUIRED)
          add_executable(consumer main.cpp)
          target_link_libraries(consumer PRIVATE Operators::operators)
          EOF
          cat > /tmp/operators-consumer/main.cpp <<'EOF'
          #include "finetune_ops/core/autograd_engine.h"
          #include "finetune_ops/core/backward_functions.h"
          #include "finetune_ops/core/device.h"
          #include "finetune_ops/core/dtype.h"
          #include "finetune_ops/core/lm_loss.h"
          #include "finetune_ops/core/logger.h"
          #include "finetune_ops/core/memory_efficient_attention.h"
          #include "finetune_ops/core/memory_manager.h"
          #include "finetune_ops/core/ops.h"
          #include "finetune_ops/core/performance_monitor.h"
          #include "finetune_ops/core/step_arena.h"
          #include "finetune_ops/core/tensor.h"
          #include "finetune_ops/core/tokenizer.h"
          #include "finetune_ops/core/tokenizer_bpe.h"
          #include "finetune_ops/core/tokenizer_gemma.h"
          #include "finetune_ops/core/utils.h"
          #include "finetune_ops/data/mmlu_dataset.h"
          #include "finetune_ops/data/wikitext2_dataset.h"
          #include "finetune_ops/graph/gemma_lora_injector.h"
          #include "finetune_ops/graph/gemma_model.h"
          #include "finetune_ops/graph/gpt2_model.h"
          #include "finetune_ops/graph/lora_injector.h"
          #include "finetune_ops/graph/lora_saver.h"
          #include "finetune_ops/graph/qwen_model.h"
          #include "finetune_ops/graph/safetensors_loader.h"
          #include "finetune_ops/nn/embedding.h"
          #include "finetune_ops/nn/lora_linear.h"
          #include "finetune_ops/optim/adam.h"
          #include "finetune_ops/optim/gemma_trainer.h"
          #include "finetune_ops/optim/optimizer.h"
          #include "finetune_ops/optim/trainer.h"
          int main() { return 0; }
          EOF
          cmake -S /tmp/operators-consumer -B /tmp/operators-consumer/build -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/operator/install"
          cmake --build /tmp/operators-consumer/build -j4

      - name: MobileFineTuner package smoke
        run: |
          mkdir -p /tmp/mft-consumer
          cat > /tmp/mft-consumer/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.16)
          project(mft_consumer LANGUAGES CXX)
          set(CMAKE_CXX_STANDARD 17)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          find_package(MobileFineTuner REQUIRED)
          add_executable(consumer main.cpp)
          target_link_libraries(consumer PRIVATE MobileFineTuner::operators)
          EOF
          cat > /tmp/mft-consumer/main.cpp <<'EOF'
          #include "mobile_finetuner/mobile_finetuner.h"
          int main() { return 0; }
          EOF
          cmake -S /tmp/mft-consumer -B /tmp/mft-consumer/build -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/operator/install"
          cmake --build /tmp/mft-consumer/build -j4

      - name: Android visualizer build
        run: |
          cd android-visualizer
          ./gradlew :app:assembleDebug

      - name: Five-model smoke
        run: bash scripts/run_training_smoke.sh
